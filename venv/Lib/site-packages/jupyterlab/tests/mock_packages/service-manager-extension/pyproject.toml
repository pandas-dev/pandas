[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mock-service-manager-package"
version = "0.0.1"

[tool.hatch.build.targets.wheel]
include = ["mock_service_manager_package.py"]

[tool.hatch.build.targets.wheel.shared-data]
"static/package.json" = "share/jupyter/labextensions/@jupyterlab/mock-service-manager-extension/package.json"
"static/static" = "share/jupyter/labextensions/@jupyterlab/mock-service-manager-extension/static"
