[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jlab-mock-provider"
version = "0.0.1"

[tool.hatch.build.targets.wheel]
include = ["jlab_mock_provider.py"]

[tool.hatch.build.targets.wheel.shared-data]
"static/package.json" = "share/jupyter/labextensions/@jupyterlab/mock-provider/package.json"
"static/static" = "share/jupyter/labextensions/@jupyterlab/mock-provider/static"
